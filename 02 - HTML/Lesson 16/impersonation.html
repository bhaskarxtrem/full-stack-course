<header>
    <h1>Report an Impersonation Account on Instagram </h1>
</header>

<main>
    <p>If someone created an Instagram account that's pretending to be you or someone you know,<br>please use this form to file a report.</p>

    <form>
        <h3>Which of the following best describes your situation</h3><br>
        <input type="radio" name="situation">
        <label>Someone created a account pretending to be me or a friend</label>

        <br><br>

        <input type="radio" name="situation">
        <label>Someone created a account pretending to be someone I represent(ex: My child)</label>

        <br><br>

        <label>Your full name:</label><br>
        <input type="text" placeholder="Enter your full name" required>

        <br><br>

        <label>Your email address:</label><br>
        <input type="email" placeholder="Enter your email" required>

        <br><br>

        <label>Your relationship with the person being impersonated</label><br>
        <input type="text" placeholder="son, friend, etc...">

        <br><br>

        <label>The full name of the person being impersonated:</label><br>
        <input type="text" placeholder="Enter the full name" required>

        <br><br>

        <label>The instagram username of the person being impersonated:</label><br>
        <input type="text" placeholder="Enter instagram username"

        <br><br>

        <label>The full name listed on account you're reporting</label><br>
        <input type="text" placeholder="Enter the full name" required>

        <br><br>

        <label>Instagram username of reported account:</label0><br>
        <input type="text" placeholder="Enter the username">
            
        <br><br>

        <label>Upload a photo with your ID</label><br>
        <input type="file" required>

        <br><br>

        <input type="submit">

    </form>


</main>
