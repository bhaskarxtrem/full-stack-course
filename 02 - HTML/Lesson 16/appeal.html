<header>
    <h1>Disabled account reappeal form</h1>
</header>

<main>
    <p>If you think your instagram account got disabled wrongly without reason , you can appeal once more here...</p>

    <form>
        <h2>Fill the information below</h2>

        <label>What was your Instagram username:</label><br>
        <input type="text" placeholder="Enter your username" required>

        <br><br>

        <label>Enter the email address that was associated with your account:</label><br>
        <input type="email" placeholder="Enter your email" required>

        <br><br>

        <label>Enter the phone number that was associated with your account:</label><br>
        <input type="tel" placeholder="optional">

        <br><br>
        <label>Did anyone else have access to your account:</label><br>
        <select required>
            <option>I'm not sure</option>
            <option>Yes, someone had access to my account</option>
            <option>No, no one had access to my account</option>
        </select>

        <br><br>

        <label>Upload your ID for verification</label><br>
        <input type="file" required>

        <br><br>

        <input type="submit">


        
    </form>
</main>
